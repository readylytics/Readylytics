name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"
    branches:
      - main

permissions:
  contents: read
  id-token: write

concurrency:
  group: ${{ github.repository }}-play-release
  cancel-in-progress: false

jobs:
  signed-release:
    runs-on: ubuntu-latest
    environment: ${{ github.ref_type == 'tag' && 'production-release' || 'beta-release' }}
    env:
      READYLYTICS_UPLOAD_STORE_PASSWORD: ${{ secrets.READYLYTICS_UPLOAD_STORE_PASSWORD }}
      READYLYTICS_UPLOAD_KEY_ALIAS: ${{ secrets.READYLYTICS_UPLOAD_KEY_ALIAS }}
      READYLYTICS_UPLOAD_KEY_PASSWORD: ${{ secrets.READYLYTICS_UPLOAD_KEY_PASSWORD }}
      READYLYTICS_UPLOAD_CERT_SHA256: ${{ secrets.READYLYTICS_UPLOAD_CERT_SHA256 }}

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Validate release workflow contract
        run: bash .github/tests/release_workflow_test.sh

      - name: Compute version
        id: version
        shell: bash
        env:
          RAW_TAG: ${{ github.ref_name }}
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            if ! [[ "$RAW_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "Release tags must match vMAJOR.MINOR.PATCH; got: $RAW_TAG" >&2
              exit 1
            fi
            VERSION_NAME="${RAW_TAG#v}"
            RELEASE_KIND="prod"
            PLAY_TRACK="production"
          else
            if [ "${{ github.ref }}" != "refs/heads/main" ]; then
              echo "Beta releases must target main; got: ${{ github.ref }}" >&2
              exit 1
            fi
            LATEST_TAG="$(git tag --merged HEAD --list 'v*' --sort=-version:refname | grep -Em1 '^v[0-9]+\.[0-9]+\.[0-9]+$' || true)"
            if [ -n "$LATEST_TAG" ]; then
              BASE_VERSION="${LATEST_TAG#v}"
            else
              BASE_VERSION="$(sed -n 's/^baseVersionName=//p' gradle.properties)"
            fi
            test -n "$BASE_VERSION"
            VERSION_NAME="${BASE_VERSION}-RC${GITHUB_RUN_NUMBER}"
            RELEASE_KIND="beta"
            PLAY_TRACK="beta"
          fi
          VERSION_CODE="$((100000 + GITHUB_RUN_NUMBER))"

          echo "Resolved versionName=$VERSION_NAME versionCode=$VERSION_CODE kind=$RELEASE_KIND track=$PLAY_TRACK"

          {
            echo "version_name=$VERSION_NAME"
            echo "version_code=$VERSION_CODE"
            echo "release_kind=$RELEASE_KIND"
            echo "play_track=$PLAY_TRACK"
          } >> "$GITHUB_OUTPUT"
          {
            echo "READYLYTICS_VERSION_NAME=$VERSION_NAME"
            echo "READYLYTICS_VERSION_CODE=$VERSION_CODE"
            echo "PLAY_TRACK=$PLAY_TRACK"
          } >> "$GITHUB_ENV"

      - name: Set up JDK 17
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Android SDK
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v3.0.0

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v3.5.0

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Decode upload keystore
        env:
          READYLYTICS_UPLOAD_STORE_BASE64: ${{ secrets.READYLYTICS_UPLOAD_STORE_BASE64 }}
        run: |
          test -n "$READYLYTICS_UPLOAD_STORE_BASE64"
          STORE_PATH="$RUNNER_TEMP/readylytics-upload.jks"
          echo "$READYLYTICS_UPLOAD_STORE_BASE64" | base64 --decode > "$STORE_PATH"
          {
            echo "READYLYTICS_UPLOAD_STORE_FILE=$STORE_PATH"
          } >> "$GITHUB_ENV"

      - name: Verify signing inputs
        run: ./gradlew verifyReleaseSigningInputs

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest

      - name: Run lint
        run: ./gradlew lint lintRelease

      - name: Build signed release bundle
        run: ./gradlew bundleRelease

      - name: Verify AAB signature
        run: |
          AAB_PATH="app/build/outputs/bundle/release/app-release.aab"
          jarsigner -verify "$AAB_PATH"

      - name: Verify release certificate fingerprint
        shell: bash
        run: |
          AAB_PATH="app/build/outputs/bundle/release/app-release.aab"
          actual_fingerprint="$(keytool -printcert -jarfile "$AAB_PATH" | sed -n 's/^[[:space:]]*SHA256:[[:space:]]*//p' | head -n 1 | tr -d '[:space:]:' | tr '[:lower:]' '[:upper:]')"
          expected_fingerprint="$(printf '%s' "$READYLYTICS_UPLOAD_CERT_SHA256" | tr -d '[:space:]:' | tr '[:lower:]' '[:upper:]')"
          test -n "$actual_fingerprint"
          test -n "$expected_fingerprint"
          if [ "$actual_fingerprint" != "$expected_fingerprint" ]; then
            echo "Artifact fingerprint mismatch."
            echo "Expected: $expected_fingerprint"
            echo "Actual:   $actual_fingerprint"
            exit 1
          fi

      - name: Upload signed release bundle
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: readylytics-${{ steps.version.outputs.release_kind }}-${{ steps.version.outputs.version_name }}-aab
          path: app/build/outputs/bundle/release/app-release.aab

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}
          create_credentials_file: true
          export_environment_variables: true

      - name: Publish to Google Play
        run: ./gradlew publishBundle --track "$PLAY_TRACK"

      - name: Delete temporary credential files
        if: ${{ always() }}
        shell: bash
        run: |
          if [ -n "${READYLYTICS_UPLOAD_STORE_FILE:-}" ]; then
            rm -f "$READYLYTICS_UPLOAD_STORE_FILE"
          fi
