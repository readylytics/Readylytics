name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"
    branches:
      - main

permissions:
  contents: read

jobs:
  signed-release:
    runs-on: ubuntu-latest
    environment: production-release
    env:
      READYLYTICS_UPLOAD_STORE_PASSWORD: ${{ secrets.READYLYTICS_UPLOAD_STORE_PASSWORD }}
      READYLYTICS_UPLOAD_KEY_ALIAS: ${{ secrets.READYLYTICS_UPLOAD_KEY_ALIAS }}
      READYLYTICS_UPLOAD_KEY_PASSWORD: ${{ secrets.READYLYTICS_UPLOAD_KEY_PASSWORD }}
      READYLYTICS_UPLOAD_CERT_SHA256: ${{ secrets.READYLYTICS_UPLOAD_CERT_SHA256 }}

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Compute version
        id: version
        shell: bash
        env:
          RAW_TAG: ${{ github.ref_name }}
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            VERSION_NAME="${RAW_TAG#v}"
            RELEASE_KIND="prod"
          else
            VERSION_NAME="$(git describe --tags --always)-beta"
            RELEASE_KIND="beta"
          fi

          echo "Resolved versionName=$VERSION_NAME kind=$RELEASE_KIND"

          {
            echo "version_name=$VERSION_NAME"
            echo "release_kind=$RELEASE_KIND"
          } >> "$GITHUB_OUTPUT"

      - name: Set up JDK 17
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Android SDK
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v3.0.0

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v3.5.0

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Decode upload keystore
        env:
          READYLYTICS_UPLOAD_STORE_BASE64: ${{ secrets.READYLYTICS_UPLOAD_STORE_BASE64 }}
        run: |
          test -n "$READYLYTICS_UPLOAD_STORE_BASE64"
          STORE_PATH="$RUNNER_TEMP/readylytics-upload.jks"
          echo "$READYLYTICS_UPLOAD_STORE_BASE64" | base64 --decode > "$STORE_PATH"
          {
            echo "READYLYTICS_UPLOAD_STORE_FILE=$STORE_PATH"
          } >> "$GITHUB_ENV"

      - name: Write Play service account key
        if: ${{ github.ref_type == 'tag' }}
        env:
          PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
        run: |
          test -n "$PLAY_SERVICE_ACCOUNT_JSON"
          KEY_PATH="$RUNNER_TEMP/play-service-account.json"
          printf '%s' "$PLAY_SERVICE_ACCOUNT_JSON" > "$KEY_PATH"
          {
            echo "PLAY_SERVICE_ACCOUNT_JSON_FILE=$KEY_PATH"
          } >> "$GITHUB_ENV"

      - name: Verify signing inputs
        run: ./gradlew verifyReleaseSigningInputs

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest

      - name: Run lint
        run: ./gradlew lint lintRelease

      - name: Build signed release bundle
        run: ./gradlew bundleRelease

      - name: Verify AAB signature
        run: |
          AAB_PATH="app/build/outputs/bundle/release/app-release.aab"
          jarsigner -verify "$AAB_PATH"

      - name: Verify release certificate fingerprint
        shell: bash
        run: |
          AAB_PATH="app/build/outputs/bundle/release/app-release.aab"
          actual_fingerprint="$(keytool -printcert -jarfile "$AAB_PATH" | sed -n 's/^[[:space:]]*SHA256:[[:space:]]*//p' | head -n 1 | tr -d '[:space:]:' | tr '[:lower:]' '[:upper:]')"
          expected_fingerprint="$(printf '%s' "$READYLYTICS_UPLOAD_CERT_SHA256" | tr -d '[:space:]:' | tr '[:lower:]' '[:upper:]')"
          test -n "$actual_fingerprint"
          test -n "$expected_fingerprint"
          if [ "$actual_fingerprint" != "$expected_fingerprint" ]; then
            echo "Artifact fingerprint mismatch."
            echo "Expected: $expected_fingerprint"
            echo "Actual:   $actual_fingerprint"
            exit 1
          fi

      - name: Upload signed release bundle
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: readylytics-${{ steps.version.outputs.release_kind }}-${{ steps.version.outputs.version_name }}-aab
          path: app/build/outputs/bundle/release/app-release.aab

      - name: Publish to Google Play
        if: ${{ github.ref_type == 'tag' }}
        run: ./gradlew publishBundle

      - name: Delete temporary credential files
        if: ${{ always() }}
        shell: bash
        run: |
          if [ -n "${READYLYTICS_UPLOAD_STORE_FILE:-}" ]; then
            rm -f "$READYLYTICS_UPLOAD_STORE_FILE"
          fi
          if [ -n "${PLAY_SERVICE_ACCOUNT_JSON_FILE:-}" ]; then
            rm -f "$PLAY_SERVICE_ACCOUNT_JSON_FILE"
          fi
