name: CI

on:
  pull_request:
    branches:
      - main
      - "feature/**"
      - "claude/**"

permissions:
  contents: read

jobs:
  validate-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4.1.1

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v4.2.1
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Setup Android SDK
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v3.0.0

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v3.5.0

      - name: Make gradlew executable
        run: chmod +x gradlew

      # --- Verification Phase ---
      # By dropping continue-on-error and using !cancelled(), GitHub naturally tracks failures
      # but continues to execute the remaining steps.

      - name: Check formatting (ktlint)
        run: ./gradlew ktlintCheck

      - name: Run lint
        if: ${{ !cancelled() }}
        run: ./gradlew lint

      - name: Run unit tests
        if: ${{ !cancelled() }}
        run: ./gradlew testDebugUnitTest

      - name: Generate coverage report
        if: ${{ !cancelled() }}
        run: ./gradlew jacocoTestReport

      - name: Enforce coverage gate (>= 30%)
        if: ${{ !cancelled() }}
        run: ./gradlew jacocoCoverageVerification

      # --- Artifact Upload Phase ---

      - name: Upload coverage report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-report
          path: build/reports/jacoco/jacocoTestReport/

      - name: Upload lint report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: lint-report
          path: app/build/reports/lint-results-debug.xml
