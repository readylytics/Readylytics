syntax = "proto3";

package com.gregor.lauritz.healthdashboard.data.preferences;

option java_package = "com.gregor.lauritz.healthdashboard.data.preferences";
option java_multiple_files = true;
option java_outer_classname = "CardConfigurationsProtoFile";

message CardConfigurationProto {
    string card_id = 1;
    bool is_visible = 2;
    int32 position = 3;
}

message CardConfigurationsProto {
    repeated CardConfigurationProto dashboard_cards = 1;
    repeated CardConfigurationProto sleep_cards = 2;
    repeated CardConfigurationProto workout_cards = 3;
}
