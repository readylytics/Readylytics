<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="{{ site.description }}">
    <link rel="icon" href="{{ '/assets/img/favicon.png' | relative_url }}" type="image/png">
    <link rel="apple-touch-icon" href="{{ '/assets/img/apple-touch-icon.png' | relative_url }}">
    <link rel="canonical" href="{{ page.url | absolute_url }}">
    <meta property="og:title" content="{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}">
    <meta property="og:description" content="{{ site.description }}">
    <meta property="og:image" content="{{ '/assets/img/logo.png' | absolute_url }}">
    <meta property="og:url" content="{{ page.url | absolute_url }}">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}">
    <meta name="twitter:description" content="{{ site.description }}">
    <meta name="twitter:image" content="{{ '/assets/img/logo.png' | absolute_url }}">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  </head>
  <body>
    <header class="site-header">
      <nav class="nav">
        <a class="brand" href="{{ '/' | relative_url }}">
          <img class="brand-logo" src="{{ '/assets/img/logo-header.png' | relative_url }}" alt="">
          Readylytics
        </a>
        <div class="nav-links">
          <a href="{{ '/about/' | relative_url }}">About</a>
          <a href="{{ '/privacy/' | relative_url }}">Privacy</a>
        </div>
      </nav>
    </header>
    <main class="page">
      {{ content }}
    </main>
    <footer class="site-footer">
      <span>Readylytics is a health tracking and recovery app, not a medical device.</span>
      <div class="footer-links">
        <a href="https://github.com/readylytics/Readylytics">View Source Code on GitHub</a>
      </div>
    </footer>
  </body>
</html>
